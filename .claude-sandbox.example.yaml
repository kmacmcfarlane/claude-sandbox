# .claude-sandbox.yaml — configuration for the sandbox container
#
# Place this file in your project root (next to .env.claude-sandbox).
# Requires 'yq' to be installed on the host.

# Container memory limit. Uses Docker memory notation (e.g. 512m, 8g, 16g).
# Swap is disabled — the container is OOM-killed if it exceeds this limit.
# Default: 8g
# memoryLimit: 8g

# Host access — control which host resources are mounted into the container.
# Each can also be enabled via CLI flags (--ssh, --git, --docker-socket, --aws)
# or environment variables (CLAUDE_SANDBOX_HOST_ACCESS_*_ENABLED=1).
# Precedence: CLI flag > env var > YAML.
hostAccess:
  # Mount ~/.ssh/ read-only (SSH keys for git remotes)
  ssh:
    enabled: false
  # Mount ~/.gitconfig read-only (git identity)
  git:
    enabled: false
  # Mount /var/run/docker.sock (host Docker daemon access)
  dockerSocket:
    enabled: false
  # Mount ~/.aws/ read-only (AWS CLI/SDK credentials)
  aws:
    enabled: false

# Extra volume mounts.
# Each mount entry has:
#   host:      absolute path on the host (required)
#   container: absolute path inside the container (required)
#   writable:  boolean, default false (mounts :ro unless true)

mounts: []
  # - host: /home/user/shared-libs
  #   container: /home/user/shared-libs
  #
  # - host: /data/datasets
  #   container: /mnt/data
  #   writable: true

# Child Dockerfile for project-specific tools.
# The launcher looks for Dockerfile.claude-sandbox in the project root by default.
# If not found, it walks parent directories (direnv-style) so monorepos or
# workspaces can share a single child Dockerfile higher up in the tree.
# Env vars CLAUDE_SANDBOX_DOCKERFILE_DIR / CLAUDE_SANDBOX_DOCKERFILE take precedence.
#
# dockerfileDir: /path/to/dir        # directory containing the child Dockerfile
# dockerfile: Dockerfile.claude-sandbox  # filename of the child Dockerfile

# Set to true to use the base image only (no child Dockerfile).
# Suppresses the missing-Dockerfile warning and skips the parent directory search.
# Env var CLAUDE_SANDBOX_BASE_ONLY=1 overrides.
# baseOnly: false
